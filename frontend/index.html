<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>To-Do list</title>
</head>
<body>
    <h1>To-Do List</h1>
    <button id="loadTasksButton">Cargar Tareas</button>

    <h2>Agregar Nueva Tarea</h2>
    <input type="text" id="tituloTarea" placeholder="Título de la tarea">
    <input type="text" id="descripcionTarea" placeholder="Descripción de la tarea">
    <input type="datetime-local" id="fechaLimiteTarea">
    <button id="agregarTareaButton">Agregar Tarea</button>

    <ul id="lista-tareas"></ul>
    
    <script src="./app.js"></script>
</body>
</html>
